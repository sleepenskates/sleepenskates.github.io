<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RX2 Hub</title>
    <link rel="stylesheet" href="style.css?v=21">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Splash Screen Styles */
        #entry-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('your-background-image.png') no-repeat center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
            transition: opacity 1s ease, visibility 1s;
        }

        #entry-overlay::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7); /* Darken */
            backdrop-filter: blur(15px); /* Blurry effect */
            z-index: -1;
        }

        #entry-overlay p {
            color: white;
            font-family: sans-serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* Hide main content initially */
        #main-site-content {
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .site-visible {
            opacity: 1 !important;
        }

        .fade-out {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>
<body onload="updateTextureCount()">

    <div id="entry-overlay" onclick="enterSite()">
        <p>click to enter...</p>
    </div>

    <div id="main-site-content">
        <div class="stars"></div>
        <div class="twinkling"></div>

        <header>
            <i class="fas fa-vault vault-icon"></i>
            <h1>RX2 Hub</h1>
            <p>Free-to-use RX2 textures for skaters. Please do not sell these!</p>
            
            <div class="search-container" style="margin-top: 15px;">
                <input type="text" id="search-bar" placeholder="Search textures..." onkeyup="filterTextures()" 
                       style="padding: 10px; border-radius: 5px; border: none; width: 250px; background: rgba(255,255,255,0.1); color: white;">
            </div>

            <p class="texture-counter">Texture Count: <span id="count-number">0</span></p>
        </header>

        <main class="container">
            </main>

        <div id="music-player">
            <div id="now-playing-toast">Now Playing: Loading...</div>
            <div class="controls-container">
                <button id="play-pause-btn" onclick="togglePlay()"><i class="fas fa-play"></i></button>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.15" oninput="changeVolume(this.value)">
                <i class="fas fa-volume-up vol-icon"></i>
            </div>
            <audio id="bg-audio"></audio>
        </div>

        <footer>
            <p>Join the Discord! - https://discord.gg/aDrD3NZQ9B</p>
        </footer>
    </div>

    <script>
        // --- ENTRY LOGIC ---
        function enterSite() {
            const overlay = document.getElementById('entry-overlay');
            const content = document.getElementById('main-site-content');
            
            // Fade out overlay
            overlay.classList.add('fade-out');
            
            // Fade in site
            content.classList.add('site-visible');
            
            // Start Music
            initMusic();
            setTimeout(() => {
                togglePlay(); 
            }, 100);
        }

        // --- TEXTURE LOGIC ---
        function updateTextureCount() {
            const cards = document.querySelectorAll('.card');
            document.getElementById('count-number').textContent = cards.length;
        }

        function filterTextures() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const title = card.querySelector('h3').textContent.toLowerCase();
                const desc = card.querySelector('p').textContent.toLowerCase();
                card.style.display = (title.includes(query) || desc.includes(query)) ? "block" : "none";
            });
        }

        function togglePreview(btn) {
            const previewArea = btn.parentElement.querySelector('.preview-area');
            if (previewArea.classList.contains('hidden')) {
                previewArea.classList.remove('hidden', 'closing-anim');
                previewArea.classList.add('show-anim');
                btn.textContent = 'Close Preview';
                btn.classList.add('active-btn');
            } else {
                previewArea.classList.remove('show-anim');
                previewArea.classList.add('closing-anim');
                btn.textContent = 'Get RX2';
                btn.classList.remove('active-btn');
                setTimeout(() => {
                    if (previewArea.classList.contains('closing-anim')) {
                        previewArea.classList.add('hidden');
                        previewArea.classList.remove('closing-anim');
                    }
                }, 300);
            }
        }

        // --- MUSIC PLAYER LOGIC ---
        const playlist = [
            { name: "16", artist: "Baby Keem", src: "music/16.mp3" },
            { name: "Been Away", artist: "Brent Faiyaz", src: "music/Been Away.mp3" },
            { name: "Mine", artist: "Cl4pers", src: "music/Mine.mp3" },
            { name: "Honest", artist: "Baby Keem", src: "music/Honest.mp3" }
        ];

        let currentTrackIndex = 0;
        const audio = document.getElementById('bg-audio');
        const playBtn = document.getElementById('play-pause-btn');
        const toast = document.getElementById('now-playing-toast');

        function initMusic() {
            currentTrackIndex = Math.floor(Math.random() * playlist.length);
            loadTrack(currentTrackIndex);
            audio.volume = 0.15;
            
            audio.onended = () => {
                currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
                loadTrack(currentTrackIndex);
                audio.play();
            };
        }

        function loadTrack(index) {
            const track = playlist[index];
            audio.src = track.src;
            toast.textContent = `Now Playing: ${track.name} - ${track.artist}`;
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play().catch(e => console.log("Playback prevented until interaction."));
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
            }
        }

        function changeVolume(val) {
            audio.volume = val;
        }
    </script>
</body>
</html>
